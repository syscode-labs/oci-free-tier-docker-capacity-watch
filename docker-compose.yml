services:
  watcher:
    image: ${WATCHER_IMAGE:-ghcr.io/syscode-labs/oci-free-tier-docker-capacity-watch:v0.1.1}
    container_name: oci-free-tier-capacity-watcher
    restart: unless-stopped
    user: ${CONTAINER_USER:-0}
    environment:
      OCI_CONFIG_FILE: /root/.oci/config
      ACCOUNTS_FILE: /app/config/accounts.json
      PROFILE_DEFAULTS_FILE: /app/config/profile.defaults.json
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    command:
      - --accounts-file=/app/config/accounts.json
      - --profile-defaults-file=/app/config/profile.defaults.json
      - --retry-seconds=${RETRY_SECONDS:-300}
    volumes:
      - ${OCI_CONFIG_DIR:-~/.oci}:/root/.oci:ro
      - ${SSH_KEY_FILE:-~/.ssh/id_rsa.pub}:/root/.ssh/id_rsa.pub:ro
      - ./config:/app/config:ro
      - ./state:/app/state
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
